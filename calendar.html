<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YK FRWRD × Tenity — Programme Calendar</title>
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent2: #0f3460;
    --bg: #f4f6fb;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --muted: #718096;
    --group: #3182ce;
    --group-bg: #dbeafe;
    --one2one: #10b981;
    --one2one-bg: #d1fae5;
    --workshop: #d69e2e;
    --workshop-bg: #fef3c7;
    --milestone: #805ad5;
    --milestone-bg: #ede9fe;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  header {
    background: var(--primary); color: #fff; padding: 28px 40px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
  }
  header h1 { font-size: 22px; font-weight: 700; }
  header .sub { font-size: 13px; color: #a0aec0; margin-top: 4px; }
  .header-actions { display: flex; gap: 10px; }
  .btn {
    display: inline-block; padding: 10px 18px; border-radius: 8px; font-size: 13px;
    font-weight: 600; text-decoration: none; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-ghost { background: rgba(255,255,255,.12); color: #fff; }

  main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; }

  .legend {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px;
  }
  .legend span {
    font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px;
  }
  .lg-group     { background: var(--group-bg);     color: var(--group); }
  .lg-one2one   { background: var(--one2one-bg);   color: var(--one2one); }
  .lg-workshop  { background: var(--workshop-bg);  color: #92700c; }
  .lg-milestone { background: var(--milestone-bg); color: var(--milestone); }

  .month { margin-bottom: 40px; }
  .month h2 {
    font-size: 17px; font-weight: 700; color: var(--primary);
    padding: 12px 16px; background: var(--card); border: 1px solid var(--border);
    border-bottom: none; border-radius: 12px 12px 0 0;
  }
  .cal {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 0 0 12px 12px; overflow: hidden;
  }
  .cal .dow {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); text-align: center; padding: 8px 4px;
    background: #f8fafc; border-bottom: 1px solid var(--border);
  }
  .cal .day {
    min-height: 92px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    padding: 6px; font-size: 11px; position: relative;
  }
  .cal .day:nth-child(7n) { border-right: none; }
  .cal .day .num { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
  .cal .day.other { background: #fafafa; }
  .cal .day.other .num { color: #cbd5e0; }
  .cal .day.weekend { background: #f8fafc; }

  .ev {
    border-radius: 6px; padding: 4px 6px; margin-bottom: 4px; line-height: 1.35;
    font-size: 10.5px; border-left: 3px solid;
  }
  .ev .t { font-weight: 700; }
  .ev .m { color: var(--muted); font-size: 10px; }
  .ev-group     { background: var(--group-bg);     border-color: var(--group); }
  .ev-one2one   { background: var(--one2one-bg);   border-color: var(--one2one); }
  .ev-workshop  { background: var(--workshop-bg);  border-color: var(--workshop); }
  .ev-milestone { background: var(--milestone-bg); border-color: var(--milestone); }

  @media (max-width: 720px) {
    .cal .day { min-height: 64px; }
    header { padding: 20px; }
    main { padding: 20px 10px 48px; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>YK FRWRD × Tenity — Programme Calendar</h1>
    <div class="sub">Road to DACH Region · July – September 2026</div>
  </div>
  <div class="header-actions">
    <a class="btn btn-ghost" href="index.html">← Dashboard</a>
    <a class="btn btn-accent" href="YK_FRWRD_Program_Calendar.xlsx" download>⬇ Download Excel</a>
  </div>
</header>

<main>
  <div class="legend">
    <span class="lg-group">● Group Session</span>
    <span class="lg-one2one">● 1:1 Session</span>
    <span class="lg-workshop">● Workshop</span>
    <span class="lg-milestone">● Milestone</span>
  </div>
  <div id="months"></div>
</main>

<script>
const EVENTS = {
  "2026-07-20": [{ t: "P1 · Onboarding Brief Sent", m: "Eda · Async", c: "milestone" }],
  "2026-07-24": [{ t: "P2 · Welcome Call — Full Cohort", m: "Eda/Elif/YK · 60 min", c: "group" }],
  "2026-07-28": [
    { t: "Deep Dives — Startups 1–4", m: "Sabina · 4 × 45 min", c: "one2one" }
  ],
  "2026-07-29": [
    { t: "Deep Dives — Startups 5–8", m: "Sabina · 4 × 45 min", c: "one2one" }
  ],
  "2026-08-03": [{ t: "MC1 · DACH Market Landscape", m: "Dimitri · 90 min", c: "group" }],
  "2026-08-04": [{ t: "MC2 · Target ICP & Partner Mapping", m: "Alper Yurder · 90 min", c: "group" }],
  "2026-08-05": [{ t: "Action Planning — S1, S2", m: "Eda/Alper · 2 × 60 min", c: "one2one" }],
  "2026-08-06": [{ t: "Action Planning — S3, S4, S5", m: "Eda/Alper · 3 × 60 min", c: "one2one" }],
  "2026-08-07": [{ t: "Action Planning — S6, S7, S8", m: "Eda/Alper · 3 × 60 min", c: "one2one" }],
  "2026-08-17": [{ t: "MC3 · Investor Landscape (DACH)", m: "TBD · 90 min", c: "group" }],
  "2026-08-19": [{ t: "MC4 · Regulatory & Compliance", m: "Sebnem/Elif · 90 min", c: "group" }],
  "2026-08-20": [{ t: "Outreach Pipeline Review — Group", m: "Eda · 45 min", c: "group" }],
  "2026-09-01": [{ t: "B&P App Scraping & AI Matching", m: "Alper Yurder · 90 min", c: "workshop" }],
  "2026-09-02": [{ t: "1:1 Pipeline Reviews — All Startups", m: "Eda · 10 min each", c: "one2one" }],
  "2026-09-14": [{ t: "Meeting Pre-Scheduling Finalisation", m: "Eda · 60 min", c: "workshop" }],
  "2026-09-21": [{ t: "B&P Logistics Briefing", m: "Eda · 45 min", c: "group" }]
};

const MONTHS = [[2026, 7], [2026, 8], [2026, 9]];
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function pad(n){ return String(n).padStart(2, "0"); }

const container = document.getElementById("months");
MONTHS.forEach(([y, m]) => {
  const first = new Date(y, m - 1, 1);
  const daysInMonth = new Date(y, m, 0).getDate();
  const lead = (first.getDay() + 6) % 7; // Monday-first offset

  let html = `<div class="month"><h2>${MONTH_NAMES[m-1]} ${y}</h2><div class="cal">`;
  DOW.forEach(d => html += `<div class="dow">${d}</div>`);

  const prevDays = new Date(y, m - 1, 0).getDate();
  for (let i = lead - 1; i >= 0; i--) {
    html += `<div class="day other"><div class="num">${prevDays - i}</div></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${y}-${pad(m)}-${pad(d)}`;
    const dow = (new Date(y, m - 1, d).getDay() + 6) % 7;
    const weekend = dow >= 5 ? " weekend" : "";
    html += `<div class="day${weekend}"><div class="num">${d}</div>`;
    (EVENTS[key] || []).forEach(ev => {
      html += `<div class="ev ev-${ev.c}"><div class="t">${ev.t}</div><div class="m">${ev.m}</div></div>`;
    });
    html += `</div>`;
  }
  const total = lead + daysInMonth;
  const trail = (7 - (total % 7)) % 7;
  for (let d = 1; d <= trail; d++) {
    html += `<div class="day other"><div class="num">${d}</div></div>`;
  }
  html += `</div></div>`;
  container.insertAdjacentHTML("beforeend", html);
});
</script>
</body>
</html>
